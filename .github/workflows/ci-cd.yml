name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger on version tags like v4.0.0
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: |
        npm install
        cd server && npm install
        cd ../client-electron && npm install
        
    - name: Build Frontend
      run: npm run build

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: |
        npm install
        cd server && npm install
        cd ../client-electron && npm install
        
    - name: Build Frontend
      run: npm run build
      
    - name: Package Server
      run: npm run package:server
      
    - name: Package Offline Zip
      run: npm run package:offline
      
    - name: Package Client (Linux .deb)
      run: npm run package:client
      
    - name: Install Wine for Windows Build
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y wine64 wine32
        
    - name: Package Client (Windows .exe)
      # Some electron-builder tasks on Linux for Windows might need Wine, 
      # but NSIS is usually fine.
      run: npm run package:client-win
      
    - name: Package Docker Setup
      run: zip atolye-docker-setup.zip docker-compose.yml Dockerfile
      
    - name: Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        name: "Atolye Platform ${{ github.ref_name }} - Sürüm Açıklaması"
        files: |
          *.deb
          *.zip
          client-electron/dist/*.exe
        body_path: release_description.txt
