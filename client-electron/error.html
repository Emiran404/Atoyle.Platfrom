<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
<title>Atolye Platform | Connection Lost</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#3525cd",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "background": "#faf8ff",
                        "on-background": "#131b2e",
                        "surface": "#faf8ff",
                        "on-surface": "#131b2e",
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        .spinner-ring {
            animation: spin 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #fffafa 0%, #ffebeb 50%, #fffafa 100%);
            background-size: 400% 400%;
        }

        .glass-panel {
            background: rgba(255, 250, 250, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        .pulse-soft {
            animation: pulse-soft 2.5s ease-in-out infinite;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.1; transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden gradient-bg">
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg px-6">
<!-- Reconnection Card -->
<div class="glass-panel rounded-xl p-12 flex flex-col items-center text-center shadow-2xl shadow-error/5">
<!-- Sophisticated Radar Spinner -->
<div class="relative w-32 h-32 mb-10">
<!-- Pulse Ring -->
<div class="absolute inset-[-8px] rounded-full bg-error/10 pulse-soft"></div>
<!-- Inner Tonal Ring -->
<div class="absolute inset-0 rounded-full border-[6px] border-error-container opacity-40"></div>
<!-- Error Animated Spinner -->
<svg class="absolute inset-0 w-full h-full spinner-ring" viewbox="0 0 100 100">
<defs>
<lineargradient id="error-gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color: #ba1a1a; stop-opacity: 1"></stop>
<stop offset="100%" style="stop-color: #ef4444; stop-opacity: 0.1"></stop>
</lineargradient>
</defs>
<path d="M 50 10 A 40 40 0 0 1 90 50" fill="none" stroke="url(#error-gradient)" stroke-linecap="round" stroke-width="6"></path>
</svg>
<!-- Core Status Icon -->
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-error" data-icon="cloud_off">cloud_off</span>
</div>
</div>
<!-- Typography Hierarchy -->
<div class="space-y-4">
<h1 class="font-manrope text-3xl font-extrabold tracking-tight text-on-background">
                    Bağlantı Bekleniyor
                </h1>
<div class="space-y-2">
<p class="text-md font-medium text-slate-500">
                        Atolye Platform sunucusu şu an ulaşılamaz durumda.
                    </p>
<div class="flex items-center justify-center gap-2 py-2 px-6 bg-error-container/40 rounded-full self-center mx-auto w-max">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-error opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-error"></span>
</span>
<span class="text-xs font-bold tracking-widest text-error uppercase font-label">
                            Ağ taranıyor...
                        </span>
</div>
</div>
</div>

<!-- Manual IP Input (New) -->
<div id="manual-section" class="mt-8 w-full transition-all duration-300">
    <button id="show-manual-btn" class="text-xs font-bold text-primary hover:text-primary/70 underline underline-offset-4 cursor-pointer">
        Sunucu IP'sini Elle Gir
    </button>
    <div id="manual-input-area" class="hidden mt-4 space-y-3">
        <input type="text" id="ip-input" placeholder="Örn: 192.168.1.9" 
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-center text-sm">
        <button id="connect-btn" class="w-full bg-primary text-white py-3 rounded-xl font-bold text-sm hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">sync_alt</span>
            Bağlan
        </button>
    </div>
</div>

<!-- Technical Guidance -->
<div class="mt-12 text-sm text-slate-500/70 border-t border-error-container/30 pt-8">
<p>Sunucu aktif olduğunda uygulama otomatik olarak kendisini yenileyecektir.</p>
</div>
</div>
</main>

<script>
    const showBtn = document.getElementById('show-manual-btn');
    const inputArea = document.getElementById('manual-input-area');
    const connectBtn = document.getElementById('connect-btn');
    const ipInput = document.getElementById('ip-input');

    showBtn.addEventListener('click', () => {
        inputArea.classList.toggle('hidden');
        showBtn.classList.add('hidden');
    });

    connectBtn.addEventListener('click', () => {
        const ip = ipInput.value.trim();
        if (ip) {
            window.electronAPI.manualConnect(ip);
        }
    });

    // Enter tuşu desteği
    ipInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            connectBtn.click();
        }
    });
</script>

<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-error/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-on-error-container/5 rounded-full blur-[120px]"></div>
</body></html>
