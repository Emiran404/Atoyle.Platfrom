<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atolye Platform Aranıyor</title>
  <style>
    body {
      background: #f8fafc;
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      border-radius: 20px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1);
      text-align: center;
      border: 1px solid #e2e8f0;
      width: 80%;
      -webkit-app-region: drag;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid #6366f1;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    h1 {
      color: #0f172a;
      font-size: 20px;
      margin-bottom: 8px;
    }

    p {
      color: #64748b;
      font-size: 14px;
      margin: 0;
    }

    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="loader"></span>
    <h1>Atolye Platform</h1>
    <p>Sunucu aranıyor, lütfen bekleyin...</p>
    <div class="status">mDNS Ağı Taranıyor</div>
  </div>
</body>
</html>
