<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>Atolye Platform | Connecting</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --background: #faf8ff;
            --surface: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --ring-bg: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #faf8ff 0%, #eef2ff 50%, #faf8ff 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            -webkit-app-region: drag;
            position: relative;
            z-index: 10;
        }

        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }

        .spinner-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid var(--ring-bg);
        }

        .spinner-active {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-center {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79, 70, 229, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--primary);
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }

        .status-text {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
        }

        #manual-section {
            margin-top: 20px;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
            -webkit-app-region: no-drag;
        }

        #manual-section.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
        }

        .input-group {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            text-align: center;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .hidden { display: none; }

        /* Background accents */
        .accent-blur {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.05);
            filter: blur(80px);
            z-index: 1;
        }

        .top-left { top: -50px; left: -50px; }
        .bottom-right { bottom: -50px; right: -50px; }
    </style>
</head>
<body>
    <div class="accent-blur top-left"></div>
    <div class="accent-blur bottom-right"></div>

    <div class="glass-panel">
        <div class="spinner-container">
            <div class="spinner-ring"></div>
            <div class="spinner-active"></div>
            <div class="icon-center">📡</div>
        </div>

        <h1>Atolye Platform</h1>
        <p>Sunucu aranıyor...</p>

        <div class="status-badge">
            <div class="dot"></div>
            <span class="status-text" id="scan-label">Ağ Taranıyor</span>
        </div>

        <div id="manual-section">
            <button id="show-manual-btn" class="btn-link">Ağ bulunamadı mı? IP'yi Elle Gir</button>
            <div id="input-group" class="input-group">
                <input type="text" id="ip-input" placeholder="Örn: 192.168.1.20">
                <button id="connect-btn" class="btn-primary">Bağlan</button>
            </div>
        </div>
    </div>

    <script>
        const showBtn = document.getElementById('show-manual-btn');
        const inputGroup = document.getElementById('input-group');
        const connectBtn = document.getElementById('connect-btn');
        const ipInput = document.getElementById('ip-input');
        const manualSection = document.getElementById('manual-section');
        const scanLabel = document.getElementById('scan-label');

        window.electronAPI.onShowManual(() => {
            manualSection.classList.add('visible');
        });

        window.electronAPI.onDiscoveryStatus((text) => {
            if (scanLabel) scanLabel.textContent = text;
        });

        // 6 saniye sonra manuel girişi göster
        setTimeout(() => {
            manualSection.classList.add('visible');
        }, 6000);

        showBtn.addEventListener('click', () => {
            inputGroup.style.display = 'flex';
            showBtn.style.display = 'none';
        });

        connectBtn.addEventListener('click', () => {
            const ip = ipInput.value.trim();
            if (ip) {
                connectBtn.textContent = 'Bağlanıyor...';
                connectBtn.disabled = true;
                window.electronAPI.manualConnect(ip);
            }
        });

        ipInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connectBtn.click();
        });
    </script>
</body>
</html>
